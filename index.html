<!DOCTYPE html>
<html lang="zh-cn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>XR SLAM 空间定位</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

      #xr-canvas {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        display: block;
        z-index: 0;
      }
      video { display: none !important; }

      #tip {
        position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,.65); color: #fff;
        padding: 9px 22px; border-radius: 24px; font-size: 14px;
        pointer-events: none; z-index: 9; white-space: nowrap;
      }
      #count {
        position: fixed; top: 18px; right: 18px;
        background: rgba(0,0,0,.55); color: #00e6c8;
        padding: 6px 14px; border-radius: 16px; font-size: 13px;
        pointer-events: none; z-index: 9;
      }
      #loading {
        position: fixed; inset: 0; z-index: 99;
        background: #000; display: flex; flex-direction: column;
        align-items: center; justify-content: center; color: #fff;
        font-size: 15px; gap: 18px; transition: opacity .4s;
      }
      #loading.hide { opacity: 0; pointer-events: none; }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(0,230,200,.25);
        border-top-color: #00e6c8;
        border-radius: 50%;
        animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── 虚拟摇杆（左下角 XZ 平面移动） ── */
      #joystick-wrap {
        display: none;
        position: fixed; bottom: 30px; left: 24px;
        z-index: 20;
      }
      #joystick-wrap.visible { display: block; }
      #joystick-zone {
        width: 120px; height: 120px;
        background: rgba(255,255,255,.12);
        border: 2px solid rgba(255,255,255,.35);
        border-radius: 50%;
        position: relative;
        touch-action: none;
      }
      #joystick-knob {
        width: 44px; height: 44px;
        background: rgba(0,230,200,.85);
        border-radius: 50%;
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      /* ── 上下按钮（右下角 Y 轴移动） ── */
      #vertical-btns {
        display: none;
        position: fixed; bottom: 30px; right: 24px;
        z-index: 20;
        flex-direction: column; gap: 12px;
      }
      #vertical-btns.visible { display: flex; }
      .v-btn {
        width: 52px; height: 52px;
        background: rgba(255,255,255,.18);
        border: 2px solid rgba(255,255,255,.45);
        border-radius: 50%;
        color: #fff; font-size: 22px;
        display: flex; align-items: center; justify-content: center;
        touch-action: none; user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="xr-canvas"></canvas>

    <div id="loading"><div class="spinner"></div><span>正在初始化摄像头...</span></div>
    <div id="tip">移动手机扫描地面...</div>
    <div id="count">已放置: 0</div>

    <!-- 虚拟摇杆（左下角 XZ 移动） -->
    <div id="joystick-wrap">
      <div id="joystick-zone"><div id="joystick-knob"></div></div>
    </div>
    <!-- 上下移动按钮（右下角） -->
    <div id="vertical-btns">
      <div class="v-btn" id="btn-up">↑</div>
      <div class="v-btn" id="btn-down">↓</div>
    </div>

    <script src="/xr-standalone/xr.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
