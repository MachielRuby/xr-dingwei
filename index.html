<!DOCTYPE html>
<html lang="zh-cn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>XR SLAM 空间定位</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

      #xr-canvas {
        position: fixed; inset: 0;
        width: 100% !important; height: 100% !important;
        z-index: 0;
      }
      #three-canvas {
        position: fixed; inset: 0;
        width: 100% !important; height: 100% !important;
        z-index: 1; pointer-events: none;
      }
      video { display: none !important; }

      /* 扫描提示条 */
      #tip {
        position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,.65); color: #fff;
        padding: 9px 22px; border-radius: 24px; font-size: 14px;
        pointer-events: none; z-index: 9; white-space: nowrap;
        letter-spacing: .5px;
      }

      /* 已放置数量角标 */
      #count {
        position: fixed; top: 18px; right: 18px;
        background: rgba(0,0,0,.55); color: #00e6c8;
        padding: 6px 14px; border-radius: 16px; font-size: 13px;
        pointer-events: none; z-index: 9;
      }

      /* 初始化 Loading 遮罩 */
      #loading {
        position: fixed; inset: 0; z-index: 99;
        background: #000; display: flex; flex-direction: column;
        align-items: center; justify-content: center; color: #fff;
        font-size: 15px; gap: 18px; transition: opacity .4s;
      }
      #loading.hide { opacity: 0; pointer-events: none; }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(0,230,200,.25);
        border-top-color: #00e6c8;
        border-radius: 50%;
        animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- AR 渲染层 -->
    <canvas id="xr-canvas"></canvas>
    <canvas id="three-canvas"></canvas>

    <!-- UI 层 -->
    <div id="loading">
      <div class="spinner"></div>
      <span>正在初始化摄像头...</span>
    </div>
    <div id="tip">移动手机扫描地面...</div>
    <div id="count">已放置：0</div>

    <!--
      加载顺序必须严格保证：
      1. xr.js      —— 8th Wall 核心运行时（挂载 XR8 全局对象）
      2. xr-slam.js —— SLAM 六自由度跟踪模块（依赖 XR8 已存在）
      3. three.js   —— 3D 渲染引擎
      4. main.js    —— 业务逻辑（type=module 确保在前三者之后执行）
    -->
    <!-- xr.js / three.js：经典脚本，同步执行，先于所有 module 脚本挂载全局 -->
    <script src="https://static.fczsyx.com/script/webar/xr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <!--
      xr-slam.js 是 ES Module；加 type="module" 后浏览器延迟执行它（defer 语义）。
      module 脚本按文档顺序执行：xr-slam.js → main.js，
      此时 XR8 / THREE 均已由上方经典脚本挂载到 window，顺序完全正确。
    -->
    <script type="module" src="https://static.fczsyx.com/script/webar/xr-slam.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
